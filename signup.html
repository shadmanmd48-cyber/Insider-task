<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Cart - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="signup-page">
    <div class="signup-card">
        <!-- Left Side-->
        <div class="left-panel hidden md:flex">
            <img src="https://static.vecteezy.com/system/resources/previews/021/671/818/original/business-presentation-people-business-people-presenting-charts-and-graphs-to-colleagues-results-and-data-concept-coach-giving-presentation-to-client-flat-design-illustration-vector.jpg"
                alt="business illustration">
            <a href="index.html" class="back-link">Back to website →</a>
            <h2>Capturing Moments,<br>Creating Memories</h2>
        </div>
        <!-- Right Side-->
        <div class="right-panel">
            <a href="index.html" class="text-gray-400 text-sm mb-4 block md:hidden">← Back</a>
            <h1>Create an account</h1>
            <p class="small-text">Already have an account? <a href="#">Log in</a></p>

            <form>
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" class="form-input" placeholder="First name">
                    <input type="text" class="form-input" placeholder="Last name">
                </div>
                <input type="email" class="form-input" placeholder="Email">
                <input type="password" class="form-input" placeholder="Password">

                <div class="terms-row">
                    <input type="checkbox" id="terms">
                    <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-create">Create account</button>
            </form>

            <div class="flex items-center gap-3 my-5">
                <div class="divider-line"></div>
                <span class="text-gray-500 text-xs">Or register with</span>
                <div class="divider-line"></div>
            </div>

            <div class="flex gap-3">
                <button class="btn-social">Google</button>
                <button class="btn-social">Apple</button>
            </div>
        </div>
    </div>

</body>

</html>
